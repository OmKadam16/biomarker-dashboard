<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biomarker Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <h1>🧬 Biomarker Dashboard</h1>
    <p class="subtitle">Clinical Health Marker Analysis</p>
    <div style="text-align:right; max-width:600px; margin: 0 auto 16px auto;">
        <a href="/logout" style="display:inline-block; padding: 8px 18px; background: transparent; border: 1.5px solid #2d6a4f; color: #2d6a4f; border-radius: 8px; font-size:0.8rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; text-decoration:none;">Logout</a>
    </div>

    <!-- STEP INDICATOR -->
    <div class="steps">
        <div class="step active" id="step-dot-1">1</div>
        <div class="step-line"></div>
        <div class="step" id="step-dot-2">2</div>
        <div class="step-line"></div>
        <div class="step" id="step-dot-3">3</div>
    </div>

    <!-- PAGE 1: Health Markers -->
    <div class="container" id="page-1">
        <p class="section-title">Step 1 — Health Markers</p>
        <label>Glucose (mg/dL)
            <input type="number" id="glucose" placeholder="Normal: 70 – 100">
        </label>
        <label>BMI
            <input type="number" id="bmi" placeholder="Normal: 18.5 – 24.9" step="0.1">
        </label>
        <label>Systolic Blood Pressure (mmHg)
            <input type="number" id="bp" placeholder="Normal: 90 – 120">
        </label>
        <label>Cholesterol (mg/dL)
            <input type="number" id="cholesterol" placeholder="Normal: 0 – 200">
        </label>
        <button onclick="goToPage2()">Next →</button>
    </div>

    <!-- PAGE 2: Personal Info -->
    <div class="container hidden" id="page-2">
        <p class="section-title">Step 2 — Personal Information</p>
        <label>Full Name
            <input type="text" id="name" placeholder="e.g. John Doe">
        </label>
        <label>Date of Birth
            <input type="text" id="birthdate" placeholder="MM/DD/YYYY" maxlength="10">
        </label>
        <label>Gender
            <select id="gender">
                <option value="">Select...</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
                <option value="Prefer not to say">Prefer not to say</option>
            </select>
        </label>
        <label>Any known conditions (optional)
            <input type="text" id="conditions" placeholder="e.g. Diabetes, Hypertension">
        </label>
        <div style="display:flex; gap:12px;">
            <button class="secondary" onclick="goToPage1()">← Back</button>
            <button onclick="runAnalysis()">Run Analysis →</button>
        </div>
    </div>

    <!-- PAGE 3: Results Dashboard -->
    <div class="container hidden" id="page-3">
        <div id="patient-header"></div>
        <p class="section-title" style="margin-top: 24px;">Analysis Results</p>
        <div id="results"></div>
        <canvas id="bioChart" style="margin-top: 30px;"></canvas>
        <button onclick="exportPDF()" style="margin-top: 20px; background: #1b4332;">Download PDF Report</button>

        <div id="bioChart" style="margin-top: 32px;">
            <p class="section-title">Past Analyses</p>
            <div id="history-table"></div>
        </div>

        <button class="secondary" style="margin-top: 24px;" onclick="resetApp()">← Start Over</button>
    </div>

    <script>
        let markerData = {};

        // ── Navigation ──────────────────────────────────────

        async function goToPage2() {
            const glucose = document.getElementById("glucose").value;
            const bmi = document.getElementById("bmi").value;
            const bp = document.getElementById("bp").value;
            const cholesterol = document.getElementById("cholesterol").value;

            if (!glucose || !bmi || !bp || !cholesterol) {
                alert("Please fill in all health markers.");
                return;
            }

            markerData = { glucose, bmi, bp, cholesterol };

            // Check if profile exists
            const res = await fetch("/get-profile");
            const profile = await res.json();

            if (profile.found) {
                // Skip page 2, run analysis directly
                const today = new Date();
                const birth = new Date(profile.birthdate);
                let age = today.getFullYear() - birth.getFullYear();
                const m = today.getMonth() - birth.getMonth();
                if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;

                const response = await fetch("/analyze", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ ...markerData, patient: { name: profile.name, age, gender: profile.gender, conditions: profile.conditions } })
                });

                const { results, score } = await response.json();
                showPage(3);
                renderDashboard(results, score, { name: profile.name, age, gender: profile.gender, conditions: profile.conditions });
            } else {
                // First time — show page 2
                showPage(2);
            }
        }

        async function runAnalysis() {
            const name = document.getElementById("name").value;
            const birthdate = document.getElementById("birthdate").value;
            const gender = document.getElementById("gender").value;
            const conditions = document.getElementById("conditions").value;

            if (!name || !birthdate || !gender) {
                alert("Please fill in your name, date of birth, and gender.");
                return;
            }

            const today = new Date();
            const birth = new Date(birthdate);
            let age = today.getFullYear() - birth.getFullYear();
            const m = today.getMonth() - birth.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;

            await fetch("/save-profile", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, birthdate, gender, conditions })
            });

            const response = await fetch("/analyze", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ ...markerData, patient: { name, age, gender, conditions } })
            });

            const { results, score } = await response.json();
            showPage(3);
            renderDashboard(results, score, { name, age, gender, conditions });
        }
        function resetApp() {
            document.querySelectorAll("input").forEach(i => i.value = "");
            document.getElementById("gender").value = "";
            showPage(1);
        }

        function showPage(n) {
            document.getElementById("page-1").classList.add("hidden");
            document.getElementById("page-2").classList.add("hidden");
            document.getElementById("page-3").classList.add("hidden");
            document.getElementById("page-" + n).classList.remove("hidden");

            document.getElementById("step-dot-1").classList.remove("active", "done");
            document.getElementById("step-dot-2").classList.remove("active", "done");
            document.getElementById("step-dot-3").classList.remove("active", "done");

            for (let i = 1; i < n; i++) {
                document.getElementById("step-dot-" + i).classList.add("done");
            }
            document.getElementById("step-dot-" + n).classList.add("active");
        }

        // ── Dashboard Rendering ──────────────────────────────

        let chart = null;
        let currentPatient = {};
        let currentResults = {};
        let currentScore = 0;

        function renderDashboard(results, score, patient) {
            currentPatient = patient;
            currentResults = results;
            currentScore = score;
            const labels = {
                glucose: "Glucose",
                bmi: "BMI",
                bp: "Blood Pressure",
                cholesterol: "Cholesterol"
            };

            // Patient header
            // Score color
let scoreColor = "#2d6a4f";
let scoreLabel = "Excellent";
if (score < 50) { scoreColor = "#c0392b"; scoreLabel = "Needs Attention"; }
else if (score < 75) { scoreColor = "#e67e22"; scoreLabel = "Fair"; }

document.getElementById("patient-header").innerHTML = `
    <div class="patient-card">
        <div class="patient-avatar">${patient.name.charAt(0).toUpperCase()}</div>
        <div>
            <div class="patient-name">${patient.name}</div>
            <div class="patient-meta">${patient.age} yrs · ${patient.gender}${patient.conditions ? " · " + patient.conditions : ""}</div>
        </div>
    </div>
    <div class="score-card">
        <div class="score-label">Health Score</div>
        <div class="score-ring">
            <svg viewBox="0 0 120 120" width="120" height="120">
                <circle cx="60" cy="60" r="50" fill="none" stroke="#e8e0d0" stroke-width="10"/>
                <circle cx="60" cy="60" r="50" fill="none" stroke="${scoreColor}" stroke-width="10"
                    stroke-dasharray="${(score / 100) * 314} 314"
                    stroke-linecap="round"
                    transform="rotate(-90 60 60)"/>
            </svg>
            <div class="score-number" style="color: ${scoreColor}">${score}</div>
        </div>
        <div class="score-status" style="color: ${scoreColor}">${scoreLabel}</div>
    </div>
`;

            // Result cards
            let html = "";
            for (const [marker, info] of Object.entries(results)) {
                const isNormal = info.status.includes("Normal");
                const cardClass = isNormal ? "normal" : "abnormal";
                const statusText = isNormal ? "✓ Normal" : "✗ Out of Range";
                html += `
                    <div class="result-card ${cardClass}">
                        <span class="marker-name">${labels[marker] || marker}</span>
                        <span class="marker-value">${info.value} ${info.unit}</span>
                        <span class="marker-status">${statusText}</span>
                    </div>`;
            }
            html += `<p class="range-hint">Reference ranges based on standard clinical guidelines.</p>`;
            document.getElementById("results").innerHTML = html;

            // Chart
            const chartLabels = Object.keys(results).map(m => labels[m] || m);
            const chartValues = Object.values(results).map(i => i.value);
            const maxValues = Object.values(results).map(i => i.max);
            const barColors = Object.values(results).map(i =>
                i.status.includes("Normal") ? "#2d6a4f" : "#c0392b"
            );

            if (chart) chart.destroy();
            chart = new Chart(document.getElementById("bioChart"), {
                type: "bar",
                data: {
                    labels: chartLabels,
                    datasets: [
                        {
                            label: "Your Value",
                            data: chartValues,
                            backgroundColor: barColors,
                            borderRadius: 8
                        },
                        {
                            label: "Max Normal",
                            data: maxValues,
                            backgroundColor: "rgba(0,0,0,0.07)",
                            borderRadius: 8
                        }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: "top" },
                        title: {
                            display: true,
                            text: "Your Values vs Normal Range",
                            color: "#1b4332",
                            font: { size: 14, weight: "600" }
                        }
                    },
                    scales: { y: { beginAtZero: true } }
                }
            });

            fetch("/history")
                .then(res => res.json())
                .then(entries => {
                    if (entries.length === 0) {
                        document.getElementById("history-table").innerHTML = "<p class='range-hint'>No past analyses yet.</p>";
                    }
                    let table = `
                        <div class="history-table-wrapper">
                        <table class="history-table">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Name</th>
                                    <th>Age</th>
                                    <th>Glucose</th>
                                    <th>BMI</th>
                                    <th>BP</th>
                                    <th>Cholesterol</th>
                                    <th>Score</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;
                    entries.forEach(e => {
                        let scoreColor = e.score >= 75 ? "#2d6a4f" : e.score >= 50 ? "#e67e22" : "#c0392b";
                        table += `
                            <tr>
                                <td>${e.date}</td>
                                <td>${e.name}</td>
                                <td>${e.age}</td>
                                <td>${e.glucose}</td>
                                <td>${e.bmi}</td>
                                <td>${e.bp}</td>
                                <td>${e.cholesterol}</td>
                                <td style="font-weight: 700; color: ${scoreColor}">${e.score}</td>
                            </tr>
                        `;
                    });
                    table += `</tbody></table></div>`;
                    document.getElementById("history-table").innerHTML = table;
                
                });
        }

        async function exportPDF() {
            const response = await fetch("/export-pdf", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    patient: currentPatient,
                    results: currentResults,
                    score: currentScore
                })
            });
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "biomarker_report.pdf";
            a.click();
        }
    </script>
</body>
</html>
